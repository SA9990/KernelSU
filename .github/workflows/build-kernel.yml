name: Kernel Build

on:
  push:
    branches:
      - main     # Change this to the branch you want to trigger builds on.
  pull_request:
    branches:
      - main     # You can also trigger on pull requests.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the kernel source
      - name: Checkout Kernel Source
        uses: actions/checkout@v3

      # Step 2: Set up Proton Clang or Custom Clang toolchain
      - name: Download and Setup Custom Clang
        run: |
          git clone https://github.com/kdrag0n/proton-clang.git --depth=1 clang
          export PATH=$(pwd)/clang/bin:$PATH

      # Step 3: Set up environment variables
      - name: Set Up Environment Variables
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
          export CLANG_TRIPLE=aarch64-linux-gnu-
          export PATH=$(pwd)/clang/bin:$PATH

      # Step 4: Configure the kernel (use device-specific defconfig)
      - name: Configure Kernel
        run: |
          make O=out <device_defconfig>   # Change to your device's defconfig
          
      # Step 5: Compile the kernel with Clang
      - name: Compile Kernel
        run: |
          make -j$(nproc) O=out ARCH=arm64 CC=clang LLVM=1

      # Step 6: Upload the compiled kernel artifacts (optional)
      - name: Upload Compiled Kernel Image
        uses: actions/upload-artifact@v3
        with:
          name: kernel-image
          path: out/arch/arm64/boot/Image.gz  # Or other appropriate path for kernel image
