name: Android Kernel Build

on:
  push:
    branches:
      - universe
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install All Required Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            libncurses-dev \
            bison \
            flex \
            bc \
            lzop \
            cpio \
            libssl-dev \
            clang \
            git \
            wget \
            curl \
            python3 \
            python3-pip \
            zip \
            unzip \
            automake \
            autoconf \
            pkg-config \
            device-tree-compiler \
            rsync \
            dos2unix \
            lld \
            u-boot-tools \
            zlib1g-dev \
            libxml2-utils \
            xsltproc \
            openjdk-11-jdk \
            repo \
            gperf \
            cmake \
            ninja-build \
            liblz4-tool \
            squashfs-tools \
            genisoimage \
            libffi-dev \
            libtool \
            libc6-dev \
            make \
            lzma \
            xz-utils \
            imagemagick \
            sudo \
            jq \
            openssl \
            ccache \
            parallel \
            apt-utils \
            patchelf \
            python-is-python3 \
            lib32z1-dev \
            lib32ncurses6 \
            lib32stdc++6 \
            gcc-multilib \
            g++-multilib \
            libreadline8 \
            libreadline-dev

      - name: Set up Environment Variables
        run: |
          echo "KERNEL_SOURCE=https://github.com/BlissRoms-Devices/android_kernel_asus_sm8250" >> config.env
          echo "KERNEL_SOURCE_BRANCH=universe" >> config.env
          echo "KERNEL_CONFIG=vendor/obiwan_defconfig" >> config.env
          echo "KERNEL_IMAGE_NAME=Image" >> config.env
          echo "ARCH=arm64" >> config.env
          echo "ADD_LOCALVERSION_TO_FILENAME=false" >> config.env
          echo "EXTRA_CMDS:LD=ld.lld" >> config.env
          echo "USE_CUSTOM_CLANG=true" >> config.env
          echo "CUSTOM_CLANG_SOURCE=https://github.com/BlissRoms/platform_prebuilts_clang_host_linux-x86_clang-r416183b1" >> config.env
          echo "CUSTOM_CLANG_BRANCH=universe" >> config.env
          echo "CLANG_BRANCH=master-kernel-build-2021" >> config.env
          echo "CLANG_VERSION=r487747c" >> config.env
          echo "ENABLE_GCC_ARM64=true" >> config.env
          echo "ENABLE_GCC_ARM32=true" >> config.env
          echo "ENABLE_KERNELSU=false" >> config.env
          echo "DISABLE-LTO=false" >> config.env
          echo "ENABLE_CCACHE=true" >> config.env
          echo "BUILD_BOOT_IMG=true" >> config.env

      - name: Clone Kernel Source
        run: |
          git clone -b $KERNEL_SOURCE_BRANCH $KERNEL_SOURCE kernel_source
          cd kernel_source
          git submodule update --init --recursive

      - name: Build Device Tree
        run: |
          cd kernel_source
          make O=out $KERNEL_CONFIG
          make O=out dtbs

      - name: Build Kernel
        run: |
          cd kernel_source
          make O=out ARCH=$ARCH CROSS_COMPILE=aarch64-linux-gnu- -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: kernel-artifacts
          path: |
            kernel_source/out/arch/arm64/boot/Image
            kernel_source/out/arch/arm64/boot/dts/*
            kernel_source/out/arch/arm64/boot/dts/overlays/*

      - name: Clean Up
        run: |
          cd kernel_source
          make O=out clean
