name: Kernel Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the current repository
      - name: Checkout Repository
        uses: actions/checkout@v3
      
      # Step 2: Install required dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            git wget curl unzip python3 zip \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cpio

      # Step 3: Clone Kernel Source and Clang Toolchain
      - name: Clone Kernel Source and Clang
        run: |
          git clone --depth=1 https://github.com/BlissRoms-Devices/android_kernel_asus_sm8250.git kernel
          git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH  # Update PATH for Clang

      # Step 4: Set up environment variables
      - name: Set Up Environment Variables
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "CROSS_COMPILE_ARM32=arm-linux-gnueabi-" >> $GITHUB_ENV
          echo "CLANG_TRIPLE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "TARGET_KERNEL_CONFIG=vendor/obiwan_defconfig" >> $GITHUB_ENV
          echo "TARGET_KERNEL_SOURCE=kernel/asus/sm8250" >> $GITHUB_ENV
          echo "TARGET_KERNEL_CLANG_VERSION=r416183b1" >> $GITHUB_ENV
          echo "TARGET_KERNEL_LLVM_BINUTILS=false" >> $GITHUB_ENV

      # Step 5: Debug - List DTS files
      - name: List DTS files
        run: |
          echo "Listing DTS files..."
          ls kernel/arch/arm64/boot/dts/

      # Step 6: Generate DTB Files Before Kernel Compilation
      - name: Generate DTB Files
        run: |
          cd kernel
          echo "Generating DTB files..."
          make O=out ${TARGET_KERNEL_CONFIG}  # Configure kernel
          make O=out dtbs ARCH=arm64 CC=clang LLVM=1  # Generate DTB files into the output directory
          if [ -n "$(ls out/arch/arm64/boot/dts/*.dtb 2>/dev/null)" ]; then
            echo "DTB files generated successfully."
          else
            echo "Failed to generate DTB files." && exit 1
          fi

      # Step 7: Compile the Kernel
      - name: Compile Kernel
        run: |
          cd kernel
          make -j$(nproc) O=out ARCH=arm64 CC=clang LLVM=1  # Compile kernel

      # Step 8: Create AnyKernel3 Zip
      - name: Create AnyKernel3 Zip
        run: |
          mkdir -p AnyKernel3/ramdisk
          cd AnyKernel3
          git clone https://github.com/AnyKernel/AnyKernel3.git .
          # Copy the compiled kernel image and DTB files into the ramdisk
          cp ../kernel/out/arch/arm64/boot/Image ramdisk/  # Include the compiled kernel image
          cp ../kernel/out/arch/arm64/boot/dts/*.dtb ramdisk/  # Include all DTB files from the output directory
          cp -r ramdisk/* .  # Move contents of ramdisk to AnyKernel root
          rm -rf ramdisk  # Clean up the temporary ramdisk directory
          zip -r AnyKernel3.zip * -x ".git*"  # Create the AnyKernel3 zip

      # Step 9: Upload the AnyKernel3 zip
      - name: Upload AnyKernel3 Zip
        uses: actions/upload-artifact@v3
        with:
          name: anykernel3-zip
          path: AnyKernel3/AnyKernel3.zip

      # Step 10: Clean up cloned repositories
      - name: Clean Up
        run: |
          rm -rf kernel clang AnyKernel3
