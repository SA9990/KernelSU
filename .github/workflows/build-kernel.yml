name: Kernel Build with DTS and DTB Handling

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:  # This enables manual triggering of the workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up the build environment
      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu bison flex libssl-dev make

      # Step 3: Build the kernel
      - name: Build Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          make vendor/obiwan_defconfig
          make -j$(nproc)

      # Step 4: DTS to DTB Compilation
      - name: Compile DTS to DTB
        run: |
          dtb_output_dir=arch/arm64/boot/dts/vendor/
          mkdir -p $dtb_output_dir
          for dts_file in $(find . -name '*.dts'); do
            dtb_file="${dts_file%.dts}.dtb"
            dtc -I dts -O dtb -o "$dtb_output_dir/$(basename $dtb_file)" "$dts_file"
          done

      # Step 5: Copy DTB files to the correct location
      - name: Post-build processing
        run: |
          dtb_destination_dir=arch/arm64/boot/dts/obiwan/
          mkdir -p $dtb_destination_dir
          cp arch/arm64/boot/dts/vendor/*.dtb $dtb_destination_dir

      # Step 6: Upload the artifacts
      - name: Upload Kernel and DTBs
        uses: actions/upload-artifact@v3
        with:
          name: kernel-and-dtbs
          path: |
            arch/arm64/boot/Image.gz
            arch/arm64/boot/dts/obiwan/*.dtb
