name: Build ARM64 Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - universe
  pull_request:
    branches:
      - universe

env:
  CONFIG_ENV: config.env
  KERNEL_SOURCE: https://github.com/BlissRoms-Devices/android_kernel_asus_sm8250
  KERNEL_SOURCE_BRANCH: universe
  KERNEL_CONFIG: vendor/obiwan_defconfig
  KERNEL_IMAGE_NAME: Image
  ARCH: arm64

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set Up Configuration
        run: source $CONFIG_ENV

      - name: Install Required Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            libncurses-dev \
            bison \
            flex \
            bc \
            lzop \
            cpio \
            libssl-dev \
            clang \
            git \
            wget \
            curl \
            python3 \
            zip \
            automake \
            autoconf \
            pkg-config \
            device-tree-compiler \
            rsync \
            dos2unix

      - name: Clone Kernel Source
        run: git clone -b $KERNEL_SOURCE_BRANCH $KERNEL_SOURCE kernel_source

      - name: Set Up Clang Toolchain
        run: |
          if [ "$USE_CUSTOM_CLANG" = "true" ]; then
            git clone -b $CUSTOM_CLANG_BRANCH $CUSTOM_CLANG_SOURCE clang
            export PATH="$HOME/clang/bin:$PATH"
            export LD=ld.lld
            export CC=clang
            export CXX=clang++
            export AR=llvm-ar
            export NM=llvm-nm
            export OBJCOPY=llvm-objcopy
            export OBJDUMP=llvm-objdump
            export STRIP=llvm-strip
            export CLANG_TRIPLE=aarch64-linux-gnu-
          fi

      - name: Kernel Build Preparation
        run: |
          cd kernel_source
          export ARCH=$ARCH
          make O=out $KERNEL_CONFIG

      - name: Build Kernel
        run: |
          cd kernel_source
          make O=out ARCH=$ARCH CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_COMPAT=arm-linux-gnueabi- -j$(nproc)

      - name: Build Device Tree Blob (DTB) and DTS
        run: |
          cd kernel_source
          make O=out dtbs

      - name: Upload Kernel Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Kernel-Artifacts
          path: |
            kernel_source/out/arch/arm64/boot/Image
            kernel_source/out/arch/arm64/boot/dts
