name: Kernel Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository and set up environment
      - name: Checkout and Setup
        uses: actions/checkout@v3
      
      # Step 2: Install dependencies
      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            git wget curl unzip python3 zip \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu cpio

      # Step 3: Clone Kernel Source and AOSP Clang
      - name: Clone Kernel and Clang
        run: |
          git clone --depth=1 https://github.com/BlissRoms-Devices/android_kernel_asus_sm8250.git kernel
          git clone --depth=1 https://github.com/BlissRoms/platform_prebuilts_clang_host_linux-x86_clang-r416183b1.git clang
          echo "$(pwd)/clang/bin" >> $GITHUB_PATH  # Update PATH for Clang

      # Step 4: Download the kernel config file
      - name: Download Kernel Config
        run: |
          mkdir -p kernel/arch/arm64/configs
          curl -o kernel/arch/arm64/configs/obiwan_defconfig https://sourceforge.net/projects/payload/files/obiwan_defconfig.txt

      # Step 5: Set up environment variables
      - name: Set Up Environment Variables
        run: |
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "TARGET_KERNEL_CONFIG=obiwan_defconfig" >> $GITHUB_ENV

      # Step 6: Generate DTB Files
      - name: Generate DTB Files
        run: |
          cd kernel
          make O=out ${TARGET_KERNEL_CONFIG}  # Configure kernel
          make O=out dtbs ARCH=arm64 CC=clang LLVM=1  # Generate DTB files
          if [ ! -f out/arch/arm64/boot/dts/*.dtb ]; then
            echo "Failed to generate DTB files." && exit 1
          fi

      # Step 7: Compile the Kernel
      - name: Compile Kernel
        run: |
          cd kernel
          make -j$(nproc) O=out ARCH=arm64 CC=clang LLVM=1  # Compile kernel

      # Step 8: Create AnyKernel3 Zip
      - name: Create AnyKernel3 Zip
        run: |
          mkdir -p AnyKernel3/ramdisk
          cd AnyKernel3
          git clone https://github.com/AnyKernel/AnyKernel3.git .
          cp ../kernel/out/arch/arm64/boot/Image ramdisk/
          cp ../kernel/out/arch/arm64/boot/dts/*.dtb ramdisk/
          cp -r ramdisk/* .  # Move contents to AnyKernel root
          rm -rf ramdisk
          zip -r AnyKernel3.zip * -x ".git*"

      # Step 9: Upload the AnyKernel3 zip
      - name: Upload AnyKernel3 Zip
        uses: actions/upload-artifact@v3
        with:
          name: anykernel3-zip
          path: AnyKernel3/AnyKernel3.zip

      # Step 10: Clean up cloned repositories
      - name: Clean Up
        run: |
          rm -rf kernel clang AnyKernel3
