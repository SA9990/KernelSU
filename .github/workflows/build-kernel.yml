- name: Build Kernel
  run: |
    cd kernel
    make O=out $KERNEL_CONFIG
    if [ -d "$DTS_LOCATION" ]; then
      echo "Building Device Tree..."
      make O=out dtbs
    else
      echo "DTS location not found: $DTS_LOCATION"
    fi
    echo "Compiling Kernel with reduced parallel jobs..."
    make O=out -j2 Image  # Reduce the number of jobs to 2
