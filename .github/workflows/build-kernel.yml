name: Add Device Tree Configuration

on:
  pull_request:
    branches:
      - main  # Change this to the appropriate branch if needed

jobs:
  add_device_tree_config:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Setup Configuration for Kernel
        run: |
          # Ensure Device Tree options are enabled
          echo "CONFIG_OF=y" >> vendor/obiwan_defconfig
          echo "CONFIG_OF_OVERLAY=y" >> vendor/obiwan_defconfig
          echo "CONFIG_DTC=y" >> vendor/obiwan_defconfig
          echo "CONFIG_ARM_OF=y" >> vendor/obiwan_defconfig
          
          # Optionally add kprobes configuration if needed
          if [ "${{ secrets.ADD_KPROBES_CONFIG }}" = "true" ]; then
              echo "CONFIG_MODULES=y" >> vendor/obiwan_defconfig
              echo "CONFIG_KPROBES=y" >> vendor/obiwan_defconfig
          fi

      - name: Commit Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add vendor/obiwan_defconfig
          git commit -m "Add Device Tree configuration options"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
